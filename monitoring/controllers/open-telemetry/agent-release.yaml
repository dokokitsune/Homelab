apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-agent
  namespace: monitoring
spec:
  dependsOn:
    - name: open-telemetry-operator
  interval: 30m
  chart:
    spec:
      chart: opentelemetry-collector
      version: 0.146.0
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: monitoring
      interval: 12h
  values:
    mode: daemonset
    image :
      repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
    presets:
      logsCollection:
        enabled: true
      kubeletMetrics:
        enabled: true
      clusterMetrics:
        enabled: true
    config:
      exporters:
        otlp:
          endpoint: "otel-gateway-opentelemetry-collector.monitoring.svc.cluster.local:4317"
          tls:
            insecure: true
      service:
        pipelines:
          metrics:
            exporters: [otlp]
          logs:
            exporters: [otlp]
          traces:
            exporters: [otlp]
