apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-gateway
  namespace: monitoring
spec:
  dependsOn:
    - name: open-telemetry-operator
  interval: 30m
  chart:
    spec:
      chart: opentelemetry-collector
      version: 0.143.0
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: monitoring
      interval: 12h
  values:
    mode: deployment
    image :
      repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
    config:
      exporters:
        otlp/prometheusremotewrite:
          endpoint: "http://kube-prometheus-stack-prometheus:9090/api/v1/write"
          tls:
            insecure: true
        otlp/loki:
          endpoint: "http://loki:3100/loki/api/v1/push"
          tls:
            insecure: true
        otlp/tempo:
          endpoint: "http://tempo:3200"
          tls:
            insecure: true

      service:
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp/prometheusremotewrite]
          logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp/loki]
          traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp/tempo]
