apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-gateway
  namespace: monitoring
spec:
  dependsOn:
    - name: opentelemetry-operator
  interval: 30m
  chart:
    spec:
      chart: opentelemetry-collector
      version: 0.143.0
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: monitoring
      interval: 12h
  values:
    mode: deployment
    config:
      exporters:
        prometheusremotewrite:
          endpoint: "http://kube-prometheus-stack-prometheus:9090/api/v1/write"
          tls:
            insecure: true
        loki:
          endpoint: "http://loki:3100/loki/api/v1/push"
          tls:
            insecure: true
        otlp:
          endpoint: "http://tempo:3200"
          tls:
            insecure: true

      service:
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [prometheusremotewrite]
          logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [loki]
          traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp]
