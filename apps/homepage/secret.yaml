apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-allowed-hosts
  namespace: homepage
spec:
  secretStoreRef:
    name: aws-secretmanager
    kind: ClusterSecretStore
  target:
    name: homepage-allowed-hosts
  data:
    - secretKey: HOMEPAGE_ALLOWED_HOSTS
      remoteRef:
        key: homelab/homepage
        property: HOMEPAGE_ALLOWED_HOSTS
