apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: app-template
        namespace: homepage
      interval: 12h
  values:
    # Homepage's Kubernetes integration needs the ServiceAccount token mounted
    # to query the cluster API (app-template disables automount by default).
    defaultPodOptions:
      automountServiceAccountToken: true
    controllers:
      homepage:
        serviceAccount:
          identifier: homepage
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.13.2
            # List form (not a map) so the order is preserved: each var must be
            # defined before it is referenced via $(VAR) for expansion to work.
            # Pod IP is required for Kubernetes probes; the allowed ingress
            # host(s) are pulled from the homepage-allowed-hosts secret.
            env:
              - name: MY_POD_IP
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              - name: HOMEPAGE_ALLOWED_HOSTS_EXTRA
                valueFrom:
                  secretKeyRef:
                    name: homepage-allowed-hosts
                    key: HOMEPAGE_ALLOWED_HOSTS
              - name: HOMEPAGE_ALLOWED_HOSTS
                value: "$(MY_POD_IP):3000,$(HOMEPAGE_ALLOWED_HOSTS_EXTRA)"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 15
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 15
    serviceAccount:
      homepage: {}
    rbac:
      roles:
        homepage:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: [namespaces, pods, nodes]
              verbs: [get, list]
            - apiGroups: [extensions, networking.k8s.io]
              resources: [ingresses]
              verbs: [get, list]
            - apiGroups: [traefik.io]
              resources: [ingressroutes]
              verbs: [get, list]
            - apiGroups: [gateway.networking.k8s.io]
              resources: [httproutes, gateways]
              verbs: [get, list]
            - apiGroups: [metrics.k8s.io]
              resources: [nodes, pods]
              verbs: [get, list]
      bindings:
        homepage:
          type: ClusterRoleBinding
          roleRef:
            identifier: homepage
          subjects:
            - identifier: homepage
    service:
      app:
        controller: homepage
        ports:
          http:
            port: 3000
    ingress:
      app:
        className: tailscale
        hosts:
          - host: homepage
            paths:
              - path: /
                pathType: ImplementationSpecific
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: homepage-secret
            hosts: [homepage]
    persistence:
      config:
        type: configMap
        name: homepage
        advancedMounts:
          homepage:
            app:
              - path: /app/config/kubernetes.yaml
                subPath: kubernetes.yaml
              - path: /app/config/settings.yaml
                subPath: settings.yaml
              - path: /app/config/services.yaml
                subPath: services.yaml
              - path: /app/config/widgets.yaml
                subPath: widgets.yaml
              - path: /app/config/bookmarks.yaml
                subPath: bookmarks.yaml
              - path: /app/config/docker.yaml
                subPath: docker.yaml
              - path: /app/config/custom.css
                subPath: custom.css
              - path: /app/config/custom.js
                subPath: custom.js
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/config/logs
