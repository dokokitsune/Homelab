apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage 
spec:
  interval: 30m
  chart:
    spec:
      chart: homepage
      version: 4.x.x
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: homepage
      interval: 12h
  values:
    ingress:
      enabled: true
      ingressClassName: tailscale
      hosts:
        - host: homepage.local
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: actualbudget-tls
          hosts: [actualbudget.local]
    persistence:
      enabled: true
      storageClass: iscsi
