apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage 
spec:
  interval: 30m
  chart:
    spec:
      chart: homepage
      version: 4.x.x
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: homepage
      interval: 12h
  values:
    extraEnvFrom:
      - name: HOMEPAGE_ALLOWED_HOSTS
        valueFrom:
          secretKeyRef:
            name: homepage-env
            key: allowed-hosts
    ingress:
      enabled: true
      ingressClassName: tailscale
      hosts:
        - host: homepage
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: homepage-secret
          hosts: [homepage]
    persistence:
      enabled: true
      storageClass: iscsi
